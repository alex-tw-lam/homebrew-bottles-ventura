name: Build and Forge Homebrew Bottle

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'The single package name to build'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build_and_forge:
    runs-on: macos-15-intel
    timeout-minutes: 60
    
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_CCACHE: "1"
      # Force targeting macOS 13 (Ventura)
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      CFLAGS: "-target x86_64-apple-macos13.0"
      CXXFLAGS: "-target x86_64-apple-macos13.0"
      LDFLAGS: "-target x86_64-apple-macos13.0"
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Homebrew and ccache
        run: |
          echo "Ensuring Homebrew is ready..."
          brew tap homebrew/core
          brew install ccache
          ccache --set-config=max_size=2G
          ccache -z
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ github.run_id }}
          restore-keys: ccache-

      - name: Build and Bottle Package
        id: build
        run: |
          set -euo pipefail
          pkg="${{ inputs.package }}"
          echo "Building bottle for $pkg..."
          
          brew uninstall --ignore-dependencies "$pkg" 2>/dev/null || true
          brew install --build-bottle --verbose "$pkg"
          brew bottle --verbose --json "$pkg"

          bottle_file=$(find . -name "${pkg}--*.bottle*.tar.gz" | head -n 1)
          if [ -z "$bottle_file" ]; then
            echo "::error::No bottle file was generated for $pkg"
            exit 1
          fi
          echo "Generated original bottle: $bottle_file"
          echo "bottle_file=$(basename $bottle_file)" >> $GITHUB_OUTPUT

      - name: Forge Ventura Bottle (狸貓換太子)
        id: forge
        if: steps.build.outputs.bottle_file != ''
        run: |
          set -euo pipefail
          BOTTLE_FILE="${{ steps.build.outputs.bottle_file }}"
          VENTURA_FILE="${BOTTLE_FILE//sequoia/ventura}"

          echo "Forging: $BOTTLE_FILE -> $VENTURA_FILE"

          # 1. Unpack (preserving permissions)
          mkdir bottle_temp
          tar -xpf "$BOTTLE_FILE" -C bottle_temp

          # 2. Modify INSTALL_RECEIPT.json
          receipt_file=$(find bottle_temp -name "INSTALL_RECEIPT.json")
          if [ -z "$receipt_file" ]; then
            echo "::error::Could not find INSTALL_RECEIPT.json in bottle!"
            exit 1
          fi
          
          echo "Original Metadata:"
          cat "$receipt_file" | grep -E 'sequoia|"os_version"'

          sed -i.bak 's/sequoia/ventura/g' "$receipt_file"
          # More robust sed to handle versions like 15.0 or 15.1.2
          sed -i.bak 's/"os_version": "macOS 15[^"]*"/"os_version": "macOS 13.0"/' "$receipt_file"
          rm "${receipt_file}.bak"
          
          echo "Forged Metadata:"
          cat "$receipt_file" | grep -E 'ventura|"os_version"'

          # 3. Repack (preserving permissions, avoiding macOS extended attributes)
          #    CRITICAL: Must pack pkg/version/ directly (NOT ./ or pkg/ alone)
          #    Homebrew's resolve_formula_names() and resolve_version() parse
          #    the FIRST tar entry as "name/version/" — any ./ prefix breaks it.
          # Find the pkg/version/ directory inside the extracted bottle
          pkg_version_dir=$(find bottle_temp -mindepth 2 -maxdepth 2 -type d | head -1)
          COPYFILE_DISABLE=1 tar -czpf "$VENTURA_FILE" -C bottle_temp "${pkg_version_dir#bottle_temp/}"

          # 4. Cleanup
          rm "$BOTTLE_FILE"
          rm -rf bottle_temp
          
          echo "forged_bottle_file=$VENTURA_FILE" >> $GITHUB_OUTPUT

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.ccache
          key: ccache-${{ github.run_id }}

      - name: Upload Forged Bottle
        if: steps.forge.outputs.forged_bottle_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: forged-bottle-${{ inputs.package }}-${{ github.run_id }}
          path: ${{ steps.forge.outputs.forged_bottle_file }}
