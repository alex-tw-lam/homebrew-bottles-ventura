name: Test Install Bottles

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID of the build to test installing'
        required: true

jobs:
  test_install:
    runs-on: macos-15-intel
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Homebrew
        run: brew tap homebrew/core

      - name: Test install-bottles.sh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "Simulating MacBook 12 manual install..."
          export GH_TOKEN=${{ github.token }}
          
          # Run the installer script. It should use Plan B.
          ./scripts/install-bottles.sh ${{ inputs.run_id }} alex-tw-lam/homebrew-bottles-ventura
          
          echo "Verifying installation..."
          if ! command -v tree &> /dev/null; then
            echo "::error::'tree' command not found after installation!"
            exit 1
          fi
          
          tree --version
          
          echo "OK: 'tree' is installed and executable."
